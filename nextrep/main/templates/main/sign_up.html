{% load static %}
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="{% static 'css/sign_up.css' %}">
    </head>
<body>
<div class="sign_up-container">

    {% if messages %}
        {% for message in messages %}
            <p class="message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <h2>Sign Up</h2>
    <form method="POST" action="{% url 'sign_up' %}">
        {% csrf_token %}

        <label for="username">Username:</label>
        <input type="text" placeholder="Enter Username" id="username" name="username" 
               value="{{ form.username.value|default:'' }}" required>
        <small class="error-msg">{{ form.username.errors }}</small>

        <label for="email">Email:</label>
        <input type="email" placeholder="Enter Madonna Email (@madonna.edu)" id="email" name="email" 
               value="{{ form.email.value|default:'' }}" required>
        <small class="error-msg">{{ form.email.errors }}</small>

        <label for="password1">Password:</label>
        <input type="password" placeholder="Enter Password" id="password1" name="password1" required>
        <small class="error-msg">{{ form.password1.errors }}</small>

        <label for="password2">Confirm Password:</label>
        <input type="password" placeholder="Confirm Password" id="password2" name="password2" required>
        <small class="error-msg">{{ form.password2.errors }}</small>

        <button type="submit">Sign Up</button>
        <p>Already have an account? <a href="{% url 'log_in' %}">Login</a></p>
    </form>
</div>
</body>
</html>
