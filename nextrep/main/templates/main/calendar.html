<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Weekly Calendar</title>
  <link rel="stylesheet" href="calendar.css">
</head>

<body>

  <div class="controls">
    <label for="personSelect">Select Trainer:</label>
    <select id="personSelect">
      <option value="john">Peter</option>
      <option value="sarah">Sarah</option>
      <option value="alex">Alex</option>
    </select>
  </div>

  <div class="calendar">
    <div class="header">
      <div>Time</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
      <div>Sun</div>
    </div>

    <div id="calendar-body"></div>
  </div>

  <script src="calendar.js"></script>
</body>

</html>
