{% load static %}
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="{% static 'css/log_in.css' %}">
    </head>
<body>
    <form method="POST" action="{% log_in %}" id="loginForm">
        <h2>Login</h2>

        {% csrf_token %}
        <div class="login-container">
            {% if error %}
                <p style="color: red;">{{ error }}</p>
            {% endif %}
            <label for="username"><p>Username:</p></label>
            <input type="text" placeholder="Enter Username" name="username" required>
    
            <label for="password"><p>Password:</p></label>
            <input type="password" placeholder="Enter Password" name="password" id="passwordField" required>
            <input type="checkbox" id="togglePassword">Show Password
            <br>
            <button type="submit">Login</button>
            <p> Not Registered, <a href="{% url 'sign_up' %}">Sign Up</a></p>
        </div>
    </form>
<script src="{% static 'js/log_in.js' %}"></script>
</body>
</html>
