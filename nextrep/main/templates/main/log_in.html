{% extends 'main/base.html' %}
{% load static %}

{% block content %}
    <form method="POST" action="{% url 'log_in' %}" id="loginForm">

        {% csrf_token %}
        <div class="login-container">
            <h2>Login</h2>
            {% if messages %}
                {% for message in messages %}
                    <p style="color: red;">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <label for="email"><p>Email:</p></label>
            <input type="email" placeholder="Enter email" name="email" required value="{{ form.email.value|default:'' }}">
    
            <label for="password"><p>Password:</p></label>
            <input type="password" placeholder="Enter Password" name="password" id="passwordField" required>
            <input type="checkbox" id="togglePassword">Show Password
            <br>
            <br>
            <button type="submit">Login</button>
            <p> Not Registered, <a href="{% url 'sign_up' %}" style="color:#4caf50;">Sign Up</a></p>
        </div>
    </form>
<script src="{% static 'js/log_in.js' %}"></script>
{% endblock %}
