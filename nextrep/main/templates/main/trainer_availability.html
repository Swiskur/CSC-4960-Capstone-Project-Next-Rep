<!DOCTYPE html>

<html>
<head>
    <title> Trainer Availability </title>
</head>

<body>
    <h2>Add your Availability!</h2>
    <form method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Save</button>
    </form>

    <h2>Availability Saved</h2>
    <ul>
        {% for slot in options %}
            <li>
                {{slot.trainer}} - {{slot.day_of_week}} - {{slot.date}} - {{slot.start_time}} - {{slot.end_time}} 
           </li>
        {% empty %}
           <li> No availability</li>
        {% endfor %}
    </ul>
</body>
</html>
